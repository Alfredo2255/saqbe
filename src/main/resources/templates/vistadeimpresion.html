<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista de Impresión - Catálogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 6px;
            background-color: #fafafa;
            page-break-inside: avoid;
        }
        .product-card h3 {
            color: #222;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .product-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .price {
            font-weight: bold;
            color: #27ae60;
            font-size: 18px;
        }
        .print-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .print-btn:hover {
            background-color: #2980b9;
        }
        @media print {
            .print-btn {
                display: none;
            }
            body {
                background-color: white;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Catálogo de Productos</h1>
            <p>Impresión optimizada para su comodidad</p>
        </header>
        <div class="products-grid">
            <div th:each="producto : ${productos}" class="product-card">
                <h3 th:text="${producto.nombre}">Nombre del Producto</h3>
                <p th:text="${producto.descripcion}">Descripción del producto...</p>
                <p class="price" th:text="'$' + ${producto.precio}">Precio</p>
            </div>
        </div>
        <button class="print-btn" onclick="window.print()">🖨️ Imprimir Catálogo</button>
    </div>
</body>
</html>
