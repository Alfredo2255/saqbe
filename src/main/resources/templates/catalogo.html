<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>SAQ B'E — Catálogo</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet"/>

    <style>
        :root{
            --jade:#2D6A4F;
            --jade-dark:#1B4332;
            --gold:#D4A017;
            --terracota:#A0522D;
            --cream:#FAF3E0;
            --negro:#1A1108;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--cream);
            font-family:'Crimson Pro',serif;
            color:var(--negro);
        }

        /* HEADER */
        header{
            background:var(--jade-dark);
            color:white;
            text-align:center;
            position:relative;
        }

        .hborder{
            height:7px;
            background:
            repeating-linear-gradient(
                90deg,
                var(--gold) 0,
                var(--gold) 12px,
                var(--jade) 12px,
                var(--jade) 24px,
                var(--terracota) 24px,
                var(--terracota) 36px,
                var(--jade) 36px,
                var(--jade) 48px
            );
        }

        .header-content{
            padding:22px;
        }

        header h1{
            font-family:'Cinzel Decorative',serif;
            letter-spacing:4px;
        }

        header p{
            font-size:0.9rem;
            opacity:0.85;
            margin-top:4px;
        }

        main{
            max-width:1200px;
            margin:auto;
            padding:30px;
        }

        .titulo{
            font-family:'Cinzel Decorative',serif;
            letter-spacing:4px;
            margin-bottom:25px;
            color:var(--jade);
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
            gap:20px;
        }

        /* CARD */
        .card{
            background:white;
            border:1px solid #eee;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            transition:0.3s;
            overflow:hidden;
            position:relative;
        }

        .card::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            right:0;
            height:3px;
            background:linear-gradient(90deg,var(--jade),var(--gold),var(--terracota));
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .foto{
            width:100%;
            height:180px;
            background:#eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .foto img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .body{
            padding:15px;
        }

        .nombre{
            font-family:'Cinzel Decorative',serif;
            color:var(--jade-dark);
            margin-bottom:6px;
        }

        .desc{
            font-size:0.9rem;
            color:#666;
            margin-bottom:10px;
        }

        .precio{
            font-family:'Cinzel Decorative',serif;
            color:var(--terracota);
            font-size:1.1rem;
        }

        .precio::before{
            content:"Q ";
            font-size:0.7rem;
        }

        .stock{
            margin-top:8px;
            font-size:0.8rem;
            color:#666;
        }

        /* BOTON */
        .btn{
            display:block;
            margin-top:12px;
            text-align:center;
            padding:9px;
            background:var(--jade);
            color:white;
            text-decoration:none;
            font-size:0.85rem;
            letter-spacing:1px;
            transition:0.2s;
        }

        .btn:hover{
            background:var(--jade-dark);
        }

        .vacio{
            text-align:center;
            padding:60px;
            color:#999;
        }

        footer{
            text-align:center;
            margin-top:40px;
            padding:25px;
            font-size:0.8rem;
            color:#aaa;
        }
    </style>
</head>

<body>
    <header>
        <div class="hborder"></div>
        <div class="header-content">
            <h1>SAQ B'E</h1>
            <p>Catálogo de productos</p>
        </div>
    </header>

    <main>
        <div class="titulo">Productos Disponibles</div>

        <div class="grid">
            <div th:if="${#lists.isEmpty(productos)}" class="vacio">
                No hay productos disponibles
            </div>

            <div class="card" th:each="p : ${productos}">
                <div class="foto">
                    <img th:if="${p.fotografia != null}" 
                         th:src="@{'data:image/jpeg;base64,' + ${p.fotografiaBase64}}" 
                         alt="Imagen del producto"/>
                    
                    <img th:unless="${p.fotografia != null}" 
                         src="https://via.placeholder.com/180?text=Sin+Imagen" 
                         alt="Sin imagen"/>
                </div>

                <div class="body">
                    <div class="nombre" th:text="${p.nombre}"></div>
                    <div class="desc" th:text="${p.descripcion}"></div>
                    <div class="precio" th:text="${#numbers.formatDecimal(p.precio,1,2)}"></div>
                    <div class="stock" th:text="'Disponibles: ' + ${p.stock}"></div>

                    <a class="btn" th:href="@{'https://wa.me/?text=Hola%20me%20interesa%20el%20producto%20' + ${p.nombre}}">
                        Consultar
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        SAQ B'E — Catálogo de productos
    </footer>
</body>
</html>
