<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAQ B'E — Acceso al Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--jade:#2D6A4F;
--jade-dark:#1B4332;
--gold:#D4A017;
--terracota:#A0522D;
--cream:#FAF3E0;
--negro:#1A1108;
}

/* fondo con patrón textil suave */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Crimson Pro',serif;
background:
linear-gradient(rgba(250,243,224,0.92),rgba(250,243,224,0.92)),
url("https://www.transparenttextures.com/patterns/az-subtle.png");
background-size:300px;
}

/* tarjeta login */

.login-box{

background:white;
padding:45px 50px;

width:380px;

border-top:12px solid var(--jade-dark);

box-shadow:0 20px 50px rgba(0,0,0,0.15);

}

/* titulo */

.titulo{
font-family:'Cinzel Decorative',serif;
font-size:26px;
letter-spacing:3px;
color:var(--jade-dark);
text-align:center;
}

.sub{
text-align:center;
font-size:13px;
letter-spacing:3px;
color:var(--gold);
margin-top:6px;
margin-bottom:35px;
}

/* labels */

label{
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#666;
}

/* inputs */

input{

width:100%;
padding:12px;
margin-top:6px;
margin-bottom:20px;

border:1px solid #ddd;

font-size:14px;

font-family:'Crimson Pro',serif;

}

/* botón */

button{

width:100%;
padding:14px;

background:var(--jade);

color:white;

border:none;

font-size:14px;
letter-spacing:2px;
text-transform:uppercase;

cursor:pointer;

transition:0.2s;

}

button:hover{
background:var(--jade-dark);
}

/* error */

.error{

background:#ffeaea;
color:#8b0000;

padding:10px;

font-size:13px;

margin-bottom:15px;

text-align:center;

}

/* footer */

.footer{
margin-top:30px;
text-align:center;
font-size:11px;
letter-spacing:2px;
color:#888;
}

/* móvil */

@media(max-width:500px){

.login-box{
width:90%;
padding:35px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="titulo">SAQ B'E</div>
<div class="sub">Sistema de Inventario</div>

<!-- ERROR LOGIN -->

<div th:if="${param.error}" class="error">
Usuario o contraseña incorrectos
</div>

<div th:if="${param.logout}" class="error" style="background:#e8f5e9;color:#1B4332">
Sesión cerrada correctamente
</div>

<form th:action="@{/login}" method="post">

<input type="hidden"
th:name="${_csrf.parameterName}"
th:value="${_csrf.token}">

<label>Usuario</label>
<input type="text" name="username" required>

<label>Contraseña</label>
<input type="password" name="password" required>

<button type="submit">Ingresar</button>

</form>

<div class="footer">
Inventario SAQ B'E • Guatemala
</div>

</div>

</body>
</html>
